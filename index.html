<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분실물 등록하기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">

    <div id="authGate" class="card" style="display:none; text-align:center;">
      <span class="eyebrow">LOST &amp; FOUND</span>
      <h1 style="margin-top:10px;">로그인이 필요해요</h1>
      <p style="color:var(--sub); font-size:0.9rem; margin-bottom:20px;">학교 구글 계정으로 로그인하면 이용할 수 있어요.</p>
      <div id="googleSignInBtn" style="display:flex; justify-content:center;"></div>
      <p id="authError" style="color:#E0483E; font-size:0.82rem; margin-top:14px;"></p>
    </div>

    <div id="appContent" style="display:none;">

      <nav class="top-nav">
        <a href="index.html" class="active">분실물 등록</a>
        <a href="search.html">분실물 찾기</a>
      </nav>

      <header class="page-header">
        <span class="eyebrow">LOST &amp; FOUND</span>
        <h1>분실물 등록하기</h1>
        <p>주운 물건의 카테고리와 특징을 입력하면<br>주인이 검색으로 쉽게 찾아갈 수 있어요.</p>
        <p style="margin-top:10px;"><span id="userBadge" style="color:var(--sub); font-size:0.8rem;"></span> · <button type="button" class="text-btn" onclick="logout()" style="padding:0; font-size:0.8rem;">로그아웃</button></p>
      </header>

      <div class="card">
        <form id="lostItemForm">

          <label class="field-label" for="mainCategory">대분류</label>
          <select id="mainCategory" required>
            <option value="" disabled selected>선택해주세요</option>
          </select>

          <label class="field-label" for="subCategory">소분류</label>
          <select id="subCategory" required disabled>
            <option value="" disabled selected>대분류를 먼저 선택해주세요</option>
          </select>

          <label class="field-label" for="colorSelect">색상</label>
          <select id="colorSelect" required>
            <option value="" disabled selected>선택해주세요</option>
          </select>

          <label class="field-label" for="studentId">학번</label>
          <input type="text" id="studentId" inputmode="numeric" placeholder="예: 20305 (학년+반+번호)" required>

          <label class="field-label" for="registrantName">이름</label>
          <input type="text" id="registrantName" placeholder="예: 홍길동" required>

          <label class="field-label" for="features">상세 특징</label>
          <textarea id="features" placeholder="브랜드, 무늬, 스티커, 흠집, 안에 든 물건 등 최대한 자세히 적어주세요. 나중에 찾는 사람이 적는 설명과 이 내용을 비교해서 검색 결과가 나와요." required></textarea>

          <label class="field-label" for="imageFile">사진</label>
          <input type="file" id="imageFile" accept="image/*" required>

          <button type="submit" id="submitBtn" class="primary">등록하기</button>
        </form>
      </div>
    </div>
  </div>

  <script src="categories.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="auth.js"></script>
  <script>
    // Apps Script 배포 후 얻은 웹앱 URL을 여기에 붙여넣으세요.
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxJKEHKTDklCDkacpSRe0yKimgdMv2F7eJEhGjz6tgFeEgcXlERYFsubWJ_FZWQ9k/exec';

    const mainSelect = document.getElementById('mainCategory');
    const subSelect = document.getElementById('subCategory');
    const colorSelect = document.getElementById('colorSelect');
    const form = document.getElementById('lostItemForm');
    const submitBtn = document.getElementById('submitBtn');

    // 대분류 옵션 채우기
    CATEGORY_TREE.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.name;
      opt.textContent = cat.name;
      mainSelect.appendChild(opt);
    });

    // 색상 옵션 채우기
    COLOR_OPTIONS.forEach(color => {
      const opt = document.createElement('option');
      opt.value = color;
      opt.textContent = color;
      colorSelect.appendChild(opt);
    });

    // 대분류 선택 시 소분류 목록 갱신
    mainSelect.addEventListener('change', () => {
      const selected = CATEGORY_TREE.find(c => c.name === mainSelect.value);
      subSelect.innerHTML = '<option value="" disabled selected>선택해주세요</option>';
      subSelect.disabled = !selected;
      if (selected) {
        selected.children.forEach(sub => {
          const opt = document.createElement('option');
          opt.value = sub;
          opt.textContent = sub;
          subSelect.appendChild(opt);
        });
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const fileInput = document.getElementById('imageFile');
      const file = fileInput.files[0];

      if (!file) {
        alert("사진을 선택해주세요.");
        return;
      }

      if (!getIdToken()) {
        alert("로그인이 만료됐어요. 다시 로그인해주세요.");
        location.reload();
        return;
      }

      submitBtn.innerText = "업로드 중...";
      submitBtn.disabled = true;

      const reader = new FileReader();

      reader.onload = function (event) {
        const base64Data = event.target.result.split(',')[1];

        const payload = {
          action: 'register',
          idToken: getIdToken(),
          mainCategory: mainSelect.value,
          subCategory: subSelect.value,
          color: colorSelect.value,
          studentId: document.getElementById('studentId').value,
          registrantName: document.getElementById('registrantName').value,
          features: document.getElementById('features').value,
          fileName: file.name,
          mimeType: file.type,
          imageFile: base64Data
        };

        fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
            // 구글 Apps Script Web App의 CORS 정책 우회를 위해 text/plain을 자주 사용합니다.
          }
        })
          .then(response => response.text())
          .then(() => {
            alert("성공적으로 등록되었습니다!");
            form.reset();
            subSelect.innerHTML = '<option value="" disabled selected>대분류를 먼저 선택해주세요</option>';
            subSelect.disabled = true;
          })
          .catch(error => {
            console.error('업로드 실패:', error);
            alert("오류가 발생했습니다. 다시 시도해주세요.");
          })
          .finally(() => {
            submitBtn.innerText = "등록하기";
            submitBtn.disabled = false;
          });
      };

      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
